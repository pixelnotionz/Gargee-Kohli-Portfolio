<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Coming Soon — Gargee Kohli</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Jost:wght@300;400&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{

height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#0b0908;
color:#f0ece0;

font-family:'Jost',sans-serif;

overflow:hidden;
}

/* glowing background orbs */

.orb{
position:absolute;
border-radius:50%;
filter:blur(80px);
opacity:.4;
}

.orb1{
width:350px;
height:350px;
background:#c4908a;
top:10%;
left:15%;
animation:float 10s ease-in-out infinite;
}

.orb2{
width:300px;
height:300px;
background:#9a6e6a;
bottom:15%;
right:20%;
animation:float 12s ease-in-out infinite;
}

@keyframes float{

0%,100%{transform:translateY(0px)}

50%{transform:translateY(-40px)}

}

/* container */

.container{

text-align:center;
z-index:2;
max-width:700px;
padding:40px;

}

/* heading */

.title{

font-family:'Playfair Display',serif;
font-size:clamp(48px,8vw,90px);
line-height:1.1;
margin-bottom:20px;

}

.title span{
color:#c4908a;
font-style:italic;
}

/* message */

.subtitle{

font-size:18px;
color:#8a8582;
margin-bottom:50px;

}

/* button */

.btn{

display:inline-block;

padding:12px 26px;

border:1px solid #c4908a;
border-radius:40px;

color:#f0ece0;
text-decoration:none;

transition:.3s;

}

.btn:hover{

background:#c4908a;
color:#0b0908;

}

</style>
</head>

<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="container">

<h1 class="title">
Work in <span>Progress</span>
</h1>

<p class="subtitle">
Coming Soon. Stay Tuned.
</p>

<a href="index.html?skipIntro=true#explore" class="btn">
Back to Portfolio
</a>

</div>

</body>
</html>
